<p class="text-xs text-slate-400 mt-1" id="mgr-modal-student-desc">ข้อมูลการเข้าเรียนสายสะสม</p>
                    </div>
                    <button onclick="closeLogsManagerModal()" class="text-slate-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto flex-grow space-y-4">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs text-slate-600 border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 font-bold border-b border-slate-200">
                                    <th class="px-4 py-2.5">วันที่ทำการบันทึก</th>
                                    <th class="px-4 py-2.5">สาเหตุการมาสาย</th>
                                    <th class="px-4 py-2.5">หมายเหตุ</th>
                                    <th class="px-4 py-2.5 text-center">การจัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="tbl-mgr-logs-body" class="divide-y divide-slate-100">

                            </tbody>

    <!-- SYSTEM CORE LOGIC JAVASCRIPT -->
    <script>
        // 📥 นำ URL เว็บแอปที่ได้จากการ Deploy ในขั้นตอนที่แล้วมาวางที่นี่
        const API_URL = "วาง_URL_เว็บแอป_YOUR_WEB_APP_URL_HERE"; 

        // ตัวแปรเก็บสถานะข้อมูลภายในระบบ (State)
        let studentsDataset = [];
        let logsDataset = [];
        let selectedStudent = null;
        let currentEditingStudentId = null;

        // ฟังก์ชันเริ่มทำงานเมื่อโหลดหน้าเว็บเสร็จสิ้น
        window.onload = function() {
            // ตั้งค่าวันที่เริ่มต้นให้กับระบบเป็นวันปัจจุบัน
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('record-date-picker').value = today;
            document.getElementById('dash-date-week-picker').value = getMondayOfCurrentWeek(new Date());

            // ตรวจสอบ Session การเข้าสู่ระบบเดิม
            if (localStorage.getItem('skb_admin_session') === 'active') {
                showPortalMainInterface();
            }
        };

        // ฟังก์ชันคำนวณหาวันจันทร์ของสัปดาห์ปัจจุบัน
        function getMondayOfCurrentWeek(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff)).toISOString().split('T')[0];
        }

        // ==========================================
        // 🔐 SECTION: SYSTEMS ACCESS & SECURITY
        // ==========================================
        function toggleApiSetup() {
            const box = document.getElementById('login-api-setup-box');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                document.getElementById('api-url-input').value = API_URL;
            }
        }

        function handleSystemLogin() {
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value.trim();

            if (user === "SKBadmin" && pass.length === 5 && !isNaN(pass)) {
                localStorage.setItem('skb_admin_session', 'active');
                showToast("เข้าสู่ระบบสำเร็จ", "ยินดีต้อนรับผู้ดูแลระบบฝ่ายปกครอง", "success");
                showPortalMainInterface();
            } else {
                showToast("ข้อมูลไม่ถูกต้อง", "กรุณาระบุ Username และ Password 5 หลักให้ถูกต้อง", "error");
            }
        }

        function handleSystemLogout() {
            localStorage.removeItem('skb_admin_session');
            document.getElementById('portal-main-view').classList.add('hidden');
            document.getElementById('sec-login-gate').classList.remove('hidden');
            showToast("ออกจากระบบแล้ว", "เซสชันของคุณถูกทำลายอย่างปลอดภัย", "info");
        }

        function showPortalMainInterface() {
            document.getElementById('sec-login-gate').classList.add('hidden');
            document.getElementById('portal-main-view').classList.remove('hidden');
            fetchCoreDatabase();
        }

        function switchPortalTab(tabName) {
            const recordTab = document.getElementById('sec-tab-record');
            const dashTab = document.getElementById('sec-tab-dashboard');
            const btnRecord = document.getElementById('tab-btn-record');
            const btnDash = document.getElementById('tab-btn-dashboard');

            if (tabName === 'record') {
                recordTab.classList.remove('hidden'); recordTab.classList.add('block');
                dashTab.classList.remove('block'); dashTab.classList.add('hidden');
                btnRecord.className = "px-3.5 py-1.5 md:px-5 md:py-2 rounded-lg text-xs font-semibold transition-all duration-200 flex items-center space-x-1.5 bg-emerald-600 text-white";
                btnDash.className = "px-3.5 py-1.5 md:px-5 md:py-2 rounded-lg text-xs font-semibold transition-all duration-200 flex items-center space-x-1.5 text-slate-300 hover:text-white";
            } else {
                dashTab.classList.remove('hidden'); dashTab.classList.add('block');
                recordTab.classList.remove('block'); recordTab.classList.add('hidden');
                btnDash.className = "px-3.5 py-1.5 md:px-5 md:py-2 rounded-lg text-xs font-semibold transition-all duration-200 flex items-center space-x-1.5 bg-emerald-600 text-white";
                btnRecord.className = "px-3.5 py-1.5 md:px-5 md:py-2 rounded-lg text-xs font-semibold transition-all duration-200 flex items-center space-x-1.5 text-slate-300 hover:text-white";
                loadDashboardCoreData();
            }
        }

        // ==========================================
        // 🔄 SECTION: CORE SYNC DATABASE (GET API)
        // ==========================================
        async function fetchCoreDatabase() {
            if (API_URL.includes("YOUR_WEB_APP_URL_HERE") || API_URL === "") {
                showToast("แจ้งเตือนโหมดจําลอง", "ยังไม่ได้ติดตั้ง Web App URL ระบบจะรันระบบจำลองบนเครื่องของคุณ", "info");
                setupMockDatabase();
                return;
            }

            const indicator = document.getElementById('conn-indicator');
            const text = document.getElementById('conn-text');
            indicator.className = "w-2.5 h-2.5 rounded-full animate-pulse bg-amber-500";
            text.innerText = "กำลังเชื่อมต่อกับเซิร์ฟเวอร์ Google Cloud Sheet...";

            try {
                // ยิงดึงข้อมูลนักเรียน
                const resStudents = await fetch(`${API_URL}?action=getStudents`);
                studentsDataset = await resStudents.json();

                // ยิงดึงข้อมูลล็อกประวัติการมาสาย
                const resLogs = await fetch(`${API_URL}?action=getLogs`);
                logsDataset = await resLogs.json();

                indicator.className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
                text.innerText = "เชื่อมต่อระบบคลาวด์ Google Sheet สำเร็จแบบ Real-time";
                updateTodayLatenessCount();
            } catch (err) {
                console.error(err);
                indicator.className = "w-2.5 h-2.5 rounded-full bg-rose-500";
                text.innerText = "การเชื่อมต่อล้มเหลว ตรวจสอบการตรวจสอบสิทธิ์หรือลิงก์ API Web App";
                showToast("Sync ล้มเหลว", "เกิดปัญหาขัดข้องทางเครือข่ายในการติดต่อคลาวด์", "error");
            }
        }

        function updateTodayLatenessCount() {
            const todayStr = document.getElementById('record-date-picker').value;
            const count = logsDataset.filter(log => log.timestamp === todayStr).length;
            document.getElementById('lbl-today-count').innerText = count;
        }

        // ==========================================
        // 🔍 SECTION: FUZZY SEARCH LOGIC
        // ==========================================
        function executeFuzzySearch(val) {
            const query = val.trim().toLowerCase();
            const dropdown = document.getElementById('search-results-dropdown');
            dropdown.innerHTML = "";

            if (!query) { dropdown.classList.add('hidden'); return; }

            const filtered = studentsDataset.filter(st => 
                st.id.toLowerCase().includes(query) || st.name.toLowerCase().includes(query)
            ).slice(0, 8); // จํากัดไว้แค่ 8 รายการเพื่อความคล่องตัวของ UI

            if (filtered.length === 0) {
                dropdown.innerHTML = `<div class="p-3 text-xs text-slate-400 text-center">❌ ไม่พบข้อมูลนักเรียนคนนี้ในระบบ</div>`;
            } else {
                filtered.forEach(st => {
                    const div = document.createElement('div');
                    div.className = "p-3 text-xs border-b border-slate-50 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-colors";
                    div.innerHTML = `
                        <div>
                            <span class="font-bold text-slate-900">${st.name}</span>
                            <p class="text-[10px] text-slate-400 mt-0.5">ชั้น: ${st.room} | เลขที่: ${st.seatNo}</p>
                        </div>
                        <span class="font-mono bg-slate-100 px-2 py-0.5 rounded font-bold text-slate-600">${st.id}</span>
                    `;
                    div.onclick = () => selectStudentProfile(st);
                    dropdown.appendChild(div);
                });
            }
            dropdown.classList.remove('hidden');
        }

        function selectStudentProfile(st) {
            selectedStudent = st;
            document.getElementById('search-results-dropdown').classList.add('hidden');
            document.getElementById('record-student-search').value = "";
            
            document.getElementById('locked-name').innerText = st.name;
            document.getElementById('locked-id').innerText = st.id;
            document.getElementById('locked-room').innerText = st.room;
            document.getElementById('locked-seat').innerText = st.seatNo;
            document.getElementById('locked-student-container').classList.remove('hidden');
        }

        function resetSelectedStudent() {
            selectedStudent = null;
            document.getElementById('locked-student-container').classList.add('hidden');
        }

        // ==========================================
        // 💾 SECTION: SAVE RECORD EXECUTION (POST API)
        // ==========================================
        async function executeLatenessSave() {
            if (!selectedStudent) {
                showToast("กรุณาระบุตัวตน", "โปรดเลือกตัวนักเรียนก่อนทำการเซฟสถิติ", "error");
                return;
            }

            const dateStr = document.getElementById('record-date-picker').value;
            const reason = document.getElementById('record-reason-select').value;
            const notes = document.getElementById('record-notes-input').value.trim() || "-";
            const logId = "LOG-" + Date.now() + Math.floor(Math.random() * 100);

            const payload = {
                logId: logId,
                timestamp: dateStr,
                id: selectedStudent.id,
                name: selectedStudent.name,
                room: selectedStudent.room,
                seatNo: selectedStudent.seatNo,
                reason: reason,
                notes: notes
            };

            const saveBtn = document.getElementById('btn-save-log');
            saveBtn.disabled = true;
            saveBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>กำลังบันทึกข้อมูลเข้าคลาวด์...</span>`;

            try {
                if (API_URL.includes("YOUR_WEB_APP_URL_HERE") || API_URL === "") {
                    // หากอยู่ในโหมดจำลอง
                    logsDataset.push(payload);
                    localStorage.setItem('mock_logs', JSON.stringify(logsDataset));
                    simulateSuccessSave();
                } else {
                    // ยิง POST ข้อมูลไปคลาวด์แบบเลี่ยงการติดบล็อก CORS
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', // เทคนิคพิเศษทำให้ส่งข้อมูลไปหา Google Script ได้แม้ติดข้อกำหนด CORS
                        body: JSON.stringify(payload)
                    });
                    
                    // เนื่องจากเป็น no-cors จะอ่านข้อความผลลัพธ์ไม่ได้ ให้เราถือว่าสำเร็จหากเซิร์ฟเวอร์ตอบรับสถานะกลับมา
                    logsDataset.push(payload);
                    simulateSuccessSave();
                }
            } catch (err) {
                showToast("บันทึกไม่สำเร็จ", "เกิดข้อผิดพลาดในการเชื่อมโยงฐานข้อมูล", "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> <span>บันทึกข้อมูลแบบออโตเซฟ</span>`;
            }
        }

        function simulateSuccessSave() {
            showToast("บันทึกสถิติสำเร็จ", `ระบบบันทึกพฤติกรรมสายของ ${selectedStudent.name} แล้ว`, "success");
            document.getElementById('record-notes-input').value = "";
            resetSelectedStudent();
            updateTodayLatenessCount();
        }

        // ==========================================
        // 📊 SECTION: ANALYTICS & DASHBOARD GENERATION
        // ==========================================
        function loadDashboardCoreData() {
            const startWeekStr = document.getElementById('dash-date-week-picker').value;
            if (!startWeekStr) return;

            const startWeekDate = new Date(startWeekStr);
            const endWeekDate = new Date(startWeekDate);
            endWeekDate.setDate(endWeekDate.getDate() + 6); // สิ้นสุดสัปดาห์ (อาทิตย์)

            // กรอง Logs เฉพาะที่อยู่ในช่วงสัปดาห์ที่กำลังเปิดตรวจ
            const weekLogs = logsDataset.filter(log => {
                const logDate = new Date(log.timestamp);
                return logDate >= startWeekDate && logDate <= endWeekDate;
            });

            // อัปเดต KPI ตัวที่ 1: ยอดรวมในสัปดาห์
            document.getElementById('kpi-total-weeks').innerText = weekLogs.length;

            // คัดแยกกลุ่มวิเคราะห์ความถี่พฤติกรรมรายบุคคลในสัปดาห์นี้
            const studentMap = {};
            weekLogs.forEach(log => {
                if (!studentMap[log.id]) {
                    studentMap[log.id] = { details: log, count: 0, dates: [] };
                }
                studentMap[log.id].count++;
                studentMap[log.id].dates.push(log.timestamp);
            });

            let highRiskCount = 0;
            let midRiskCount = 0;
            const leaderboardData = [];

            Object.keys(studentMap).forEach(id => {
                const item = studentMap[id];
                // เงื่อนไข High Risk: สายสะสมตั้งแต่ 3 วันขึ้นไปในสัปดาห์นั้น
                if (item.count >= 3) highRiskCount++;
                // เงื่อนไข Medium Risk: สาย 2 ครั้งในหนึ่งสัปดาห์
                else if (item.count === 2) midRiskCount++;

                leaderboardData.push({
                    id: id,
                    name: item.details.name,
                    roomInfo: `ม.${item.details.room} / เลขที่ ${item.details.seatNo}`,
                    count: item.count
                });
            });

            document.getElementById('kpi-high-risk').innerText = highRiskCount;
            document.getElementById('kpi-mid-risk').innerText = midRiskCount;

            // วาดตารางลีดเดอร์บอร์ดคนมาสายบ่อยที่สุด
            leaderboardData.sort((a, b) => b.count - a.count);
            renderLeaderboardTable(leaderboardData);

            // คำนวณกราฟประมวลผลแท่ง (กระจายวันทำงาน) และกราฟวงกลมแยกสาเหตุ
            generateDashboardCharts(weekLogs);
        }

        function renderLeaderboardTable(data) {
            const tbody = document.getElementById('tbl-leaderboard-body');
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-8 text-center text-slate-400">📭 ไม่มีประวัติการเข้าเรียนสายสะสมในสัปดาห์ที่ระบุ</td></tr>`;
                return;
            }

            data.forEach((st, idx) => {
                let badge = `<span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-bold text-[10px]">เฝ้าระวังปกติ</span>`;
                if (st.count >= 3) {
                    badge = `<span class="bg-rose-50 text-rose-600 border border-rose-100 px-2 py-0.5 rounded-full font-bold text-[10px]">🚨 เสี่ยงสูง (เชิญผู้ปกครอง)</span>`;
                } else if (st.count === 2) {
                    badge = `<span class="bg-amber-50 text-amber-600 border border-amber-100 px-2 py-0.5 rounded-full font-bold text-[10px]">⚠️ เสี่ยงกลาง (ตักเตือน)</span>`;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-colors";
                tr.innerHTML = `
                    <td class="px-5 py-3 text-center font-bold text-slate-400">${idx + 1}</td>
                    <td class="px-5 py-3 font-mono font-bold text-slate-700">${st.id}</td>
                    <td class="px-5 py-3 font-bold text-slate-900">${st.name}</td>
                    <td class="px-5 py-3 font-medium text-slate-500">${st.roomInfo}</td>
                    <td class="px-5 py-3 text-center font-bold text-slate-900">${st.count} ครั้ง</td>
                    <td class="px-5 py-3">${badge}</td>
                    <td class="px-5 py-3 text-center">
                        <button onclick="openLogsManagerModal('${st.id}')" class="bg-slate-100 hover:bg-slate-900 hover:text-white text-slate-600 font-bold px-3 py-1 rounded-xl transition-all duration-150">
                            <i class="fa-solid fa-folder-open mr-1"></i> ตรวจดู/ลบ
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function generateDashboardCharts(weekLogs) {
            // 1. คำนวณวันจันทร์-ศุกร์ เพื่อวาดกราฟแท่ง
            const daysCount = { 'Mon': 0, 'Tue': 0, 'Wed': 0, 'Thu': 0, 'Fri': 0 };
            const reasonsCount = {};

            weekLogs.forEach(log => {
                const d = new Date(log.timestamp);
                const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                if (daysCount[dayName] !== undefined) daysCount[dayName]++;

                reasonsCount[log.reason] = (reasonsCount[log.reason] || 0) + 1;
            });

            // วาดกราฟแท่งด้วยดีไซน์ขยายยืดหดของ Tailwind
            const barHolder = document.getElementById('chart-bar-holder');
            barHolder.innerHTML = "";
            
            const maxVal = Math.max(...Object.values(daysCount), 1);
            const dayThLabels = { 'Mon': 'จันทร์', 'Tue': 'อังคาร', 'Wed': 'พุธ', 'Thu': 'พฤหัสฯ', 'Fri': 'ศุกร์' };

            Object.keys(daysCount).forEach(day => {
                const count = daysCount[day];
                const pct = (count / maxVal) * 80 + 10; // แปลงส่วนสูงเปรียบเทียบ
                const bar = document.createElement('div');
                bar.className = "flex flex-col items-center flex-grow group space-y-2";
                bar.innerHTML = `
                    <div class="w-8 bg-slate-100 group-hover:bg-emerald-500 rounded-t-lg transition-all relative flex items-end justify-center" style="height: ${pct}%">
                        <span class="absolute -top-6 text-[10px] font-bold text-slate-900 opacity-0 group-hover:opacity-100 transition-opacity bg-white border shadow px-1.5 py-0.5 rounded">${count} ราย</span>
                    </div>
                    <span class="text-[11px] font-bold text-slate-400 group-hover:text-slate-700">${dayThLabels[day]}</span>
                `;
                barHolder.appendChild(bar);
            });

            // 2. ประมวลสัดส่วนเหตุผลเพื่อจัดทำ Legend รายการประกอบ
            const legendList = document.getElementById('reasons-legend-list');
            legendList.innerHTML = "";
            const total = weekLogs.length || 1;

            const colors = ['bg-emerald-500', 'bg-amber-500', 'bg-rose-500', 'bg-sky-500', 'bg-purple-500'];
            let colorIdx = 0;

            Object.keys(reasonsCount).forEach(reason => {
                const count = reasonsCount[reason];
                const pct = ((count / total) * 100).toFixed(0);
                const li = document.createElement('li');
                li.className = "flex items-center justify-between gap-4";
                li.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full ${colors[colorIdx % colors.length]}"></span>
                        <span>${reason}</span>
                    </div>
                    <strong class="font-mono text-slate-900">${pct}% (${count})</strong>
                `;
                legendList.appendChild(li);
                colorIdx++;
            });
        }

        // ==========================================
        // 🗂️ SECTION: DETAIL LOGS MANAGEMENT & DELETE
        // ==========================================
        function openLogsManagerModal(studentId) {
            currentEditingStudentId = studentId;
            const studentLogs = logsDataset.filter(log => log.id === studentId);
            if (studentLogs.length === 0) return;

            document.getElementById('mgr-modal-student-name').innerText = studentLogs[0].name;
            document.getElementById('mgr-modal-student-desc').innerText = `รหัสประจำตัว: ${studentLogs[0].id} | ระดับชั้น: ม.${studentLogs[0].room} / เลขที่ ${studentLogs[0].seatNo}`;

            const tbody = document.getElementById('tbl-mgr-logs-body');
            tbody.innerHTML = "";

            studentLogs.forEach(log => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-2 text-slate-700 font-mono">${log.timestamp}</td>
                    <td class="px-4 py-2 font-medium text-slate-800">${log.reason}</td>
                    <td class="px-4 py-2 text-slate-400">${log.notes}</td>
                    <td class="px-4 py-2 text-center">
                        <button onclick="triggerDeleteConfirmation('${log.logId}')" class="text-rose-500 hover:text-rose-700 p-1 font-bold text-xs">
                            <i class="fa-regular fa-trash-can"></i> ลบรายการนี้
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('logs-manager-modal').classList.remove('hidden');
        }

        function closeLogsManagerModal() {
            document.getElementById('logs-manager-modal').classList.add('hidden');
        }

        function triggerDeleteConfirmation(logId) {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-modal-text').innerText = `คุณแน่ใจหรือไม่ว่าต้องการลบล็อกข้อมูลการสายรหัส "${logId}" ออกจากระบบคลาวด์? การทำรายการนี้ไม่สามารถย้อนคืนได้`;
            modal.classList.remove('hidden');

            document.getElementById('confirm-submit-btn').onclick = async function() {
                modal.classList.add('hidden');
                await executeDeleteLogFromCloud(logId);
            };
            document.getElementById('confirm-cancel-btn').onclick = function() {
                modal.classList.add('hidden');
            };
        }

        async function executeDeleteLogFromCloud(logId) {
            showToast("กำลังดำเนินรายการ", "กำลังส่งคำสั่งขอลบข้อมูลประวัติออกจากระบบคลาวด์...", "info");
            
            try {
                if (API_URL.includes("YOUR_WEB_APP_URL_HERE") || API_URL === "") {
                    logsDataset = logsDataset.filter(l => l.logId !== logId);
                    localStorage.setItem('mock_logs', JSON.stringify(logsDataset));
                    handleDeleteSuccess();
                } else {
                    const res = await fetch(`${API_URL}?action=deleteLog&logId=${logId}`);
                    const result = await res.json();
                    if (result.status === "success") {
                        logsDataset = logsDataset.filter(l => l.logId !== logId);
                        handleDeleteSuccess();
                    } else {
                        showToast("การลบล้มเหลว", "เซิร์ฟเวอร์ปฏิเสธการลบ หรือไม่พบไอดีล็อกนี้", "error");
                    }
                }
            } catch (err) {
                showToast("เครือข่ายขัดข้อง", "ไม่สามารถส่งคำสั่งลบไปยังกูเกิลชีตได้", "error");
            }
        }

        function handleDeleteSuccess() {
            showToast("ลบข้อมูลสำเร็จ", "ประวัติถูกทำลายออกจากระบบเรียบร้อยแล้ว", "success");
            // รีโหลดหน้าต่างประวัติย่อยใหม่
            const checkStillHasLogs = logsDataset.filter(log => log.id === currentEditingStudentId);
            if (checkStillHasLogs.length > 0) {
                openLogsManagerModal(currentEditingStudentId);
            } else {
                closeLogsManagerModal();
            }
            loadDashboardCoreData(); // อัปเดตตารางสรุปหลักเบื้องหลัง
        }

        // ==========================================
        // 🖨️ SECTION: REPORT GENERATION & PRINT
        // ==========================================
        function handlePrintExport() {
            const currentWeek = document.getElementById('dash-date-week-picker').value;
            document.getElementById('print-date-subtitle').innerText = `รายงานผลประจำสัปดาห์เริ่มต้น: วันจันทร์ที่ ${currentWeek} (พิมพ์รายงานเมื่อ: ${new Date().toLocaleString('th-TH')})`;
            window.print();
        }

        // ==========================================
        // 💡 SECTION: TOAST NOTIFICATIONS HANDLER
        // ==========================================
        function showToast(title, message, type = "success") {
            const toast = document.getElementById('toast-notification');
            const iconBg = document.getElementById('toast-icon-bg');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-message').innerText = message;

            if (type === 'success') {
                iconBg.className = "p-2 rounded-xl text-white bg-emerald-500";
                icon.className = "fa-solid fa-circle-check";
            } else if (type === 'error') {
                iconBg.className = "p-2 rounded-xl text-white bg-rose-500";
                icon.className = "fa-solid fa-circle-xmark";
            } else {
                iconBg.className = "p-2 rounded-xl text-white bg-sky-500";
                icon.className = "fa-solid fa-circle-info";
            }

            toast.className = "fixed top-5 right-5 z-[9999] transform translate-y-0 opacity-100 transition-all duration-300 max-w-sm w-full bg-white shadow-xl rounded-2xl border border-slate-100 p-4 flex items-start space-x-3";
            
            setTimeout(() => {
                toast.className = "fixed top-5 right-5 z-[9999] transform translate-y-[-150%] opacity-0 transition-all duration-300 max-w-sm w-full bg-white shadow-xl rounded-2xl border border-slate-100 p-4 flex items-start space-x-3 pointer-events-none";
            }, 3500);
        }

        // ==========================================
        // 📦 MOCK LOCAL DATABASE SETUP
        // ==========================================
        function setupMockDatabase() {
            studentsDataset = [
                { id: "10001", name: "นายสมศักดิ์ รักดี", room: "6/1", seatNo: "1" },
                { id: "10002", name: "นางสาวสมหญิง เรียนเก่ง", room: "6/1", seatNo: "2" },
                { id: "10003", name: "นายธนพล ขยันมาสาย", room: "6/2", seatNo: "15" },
                { id: "10004", name: "นางสาวกนกกร พรประเสริฐ", room: "5/3", seatNo: "24" },
                { id: "10005", name: "นายปกรณ์ เกียรติเจริญ", room: "4/2", seatNo: "8" }
            ];
            
            const savedMockLogs = localStorage.getItem('mock_logs');
            if (savedMockLogs) {
                logsDataset = JSON.parse(savedMockLogs);
            } else {
                logsDataset = [
                    { logId: "LOG-01", timestamp: getMondayOfCurrentWeek(new Date()), id: "10003", name: "นายธนพล ขยันมาสาย", room: "6/2", seatNo: "15", reason: "ตื่นสาย / ทำภารกิจส่วนตัวไม่ทัน", notes: "รถมอเตอร์ไซค์สตาร์ทไม่ติด" }
                ];
            }
            updateTodayLatenessCount();
        }

        function openConnectionSetting() {
            const newUrl = prompt("กรุณาระบุ Web App URL ของกูเกิลสคริปต์ที่คัดลอกมาเพื่อเปิดโหมด Cloud:", API_URL);
            if (newUrl !== null) {
                alert("บันทึกช่องทางการเชื่อมต่อแล้ว ระบบจะทำการรีโหลดหน้าเว็บเพื่อตั้งค่าใหม่");
                location.reload();
            }
        }
    </script>
