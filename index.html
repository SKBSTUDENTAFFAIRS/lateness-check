    <!-- SYSTEM CORE LOGIC JAVASCRIPT -->
    <script>
        // 📥 วางลิงก์ Web App URL ของคุณที่นี่ (เมื่อ Deploy เสร็จสิ้น)
        const API_URL = "วาง_URL_เว็บแอป_YOUR_WEB_APP_URL_HERE"; 

        // State Management ของระบบ
        let studentsDataset = [];
        let logsDataset = [];
        let selectedStudent = null;
        let currentEditingStudentId = null;

        window.onload = function() {
            // ตั้งค่าเวลาปัจจุบันเริ่มต้น
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('record-date-picker').value = today;
            document.getElementById('dash-date-week-picker').value = getMondayOfCurrentWeek(new Date());

            // เช็คการเข้าสู่ระบบเดิม
            if (localStorage.getItem('skb_admin_session') === 'active') {
                showPortalMainInterface();
            }
        };

        // ฟังก์ชันช่วยจัดรูปแบบวันที่ให้ตรงกัน (ป้องกันปัญหา Date format mismatch)
        function normalizeDate(dateInput) {
            if (!dateInput) return "";
            let d = new Date(dateInput);
            if (isNaN(d.getTime())) return String(dateInput).trim(); // ตัวเลือกสำรองกรณีอ่านขัดข้อง
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getMondayOfCurrentWeek(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return normalizeDate(new Date(date.setDate(diff)));
        }

        // ==========================================
        // 🔐 SECTION: SYSTEMS ACCESS & SECURITY
        // ==========================================
        function toggleApiSetup() {
            const box = document.getElementById('login-api-setup-box');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                document.getElementById('api-url-input').value = API_URL;
            }
        }

        function handleSystemLogin() {
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value.trim();

            if (user === "SKBadmin" && pass.length === 5 && !isNaN(pass)) {
                localStorage.setItem('skb_admin_session', 'active');
                showToast("🔐 เข้าสู่ระบบสำเร็จ", "ระบบกำลังนำทางท่านเข้าสู่แดชบอร์ดความปลอดภัยสูง", "success");
                showPortalMainInterface();
            } else {
                showToast("❌ ข้อมูลไม่ถูกต้อง", "กรุณาระบุรหัสผ่านฝ่ายปกครอง 5 หลักใหม่อีกครั้ง", "error");
            }
        }

        function handleSystemLogout() {
            localStorage.removeItem('skb_admin_session');
            document.getElementById('portal-main-view').classList.add('hidden');
            document.getElementById('sec-login-gate').classList.remove('hidden');
            showToast("👋 ออกจากระบบแล้ว", "ออกจากเซสชันระบบจัดการอย่างปลอดภัย", "info");
        }

        function showPortalMainInterface() {
            const mainView = document.getElementById('portal-main-view');
            document.getElementById('sec-login-gate').classList.add('hidden');
            mainView.classList.remove('hidden');
            mainView.classList.add('animate-premium-entry'); // เอฟเฟกต์ค่อยๆ ลอยขึ้นมาพรีเมียมมาก
            fetchCoreDatabase();
        }

        // ฟังก์ชันสลับหน้าเพจแบบนิ่มนวลที่สุด (Smooth Tab Switching)
        function switchPortalTab(tabName) {
            const recordTab = document.getElementById('sec-tab-record');
            const dashTab = document.getElementById('sec-tab-dashboard');
            const btnRecord = document.getElementById('tab-btn-record');
            const btnDash = document.getElementById('tab-btn-dashboard');

            if (tabName === 'record') {
                recordTab.classList.remove('hidden');
                recordTab.classList.add('block', 'animate-premium-entry');
                dashTab.classList.remove('block');
                dashTab.classList.add('hidden');
                
                btnRecord.className = "premium-btn px-4 py-2 rounded-xl text-xs font-bold transition-all duration-300 flex items-center space-x-2 bg-emerald-600 text-white shadow-lg active-glow shadow-emerald-500/20";
                btnDash.className = "premium-btn px-4 py-2 rounded-xl text-xs font-bold transition-all duration-300 flex items-center space-x-2 text-slate-400 hover:text-white";
            } else {
                dashTab.classList.remove('hidden');
                dashTab.classList.add('block', 'animate-premium-entry');
                recordTab.classList.remove('block');
                recordTab.classList.add('hidden');

                btnDash.className = "premium-btn px-4 py-2 rounded-xl text-xs font-bold transition-all duration-300 flex items-center space-x-2 bg-emerald-600 text-white shadow-lg active-glow shadow-emerald-500/20";
                btnRecord.className = "premium-btn px-4 py-2 rounded-xl text-xs font-bold transition-all duration-300 flex items-center space-x-2 text-slate-400 hover:text-white";
                loadDashboardCoreData();
            }
        }

        // ==========================================
        // 🔄 SECTION: CORE SYNC DATABASE (GET API)
        // ==========================================
        async function fetchCoreDatabase() {
            const indicator = document.getElementById('conn-indicator');
            const text = document.getElementById('conn-text');
            
            // ตรวจสอบว่าแอปเชื่อมกับ Cloud หรือ Demo Mode
            if (API_URL.includes("YOUR_WEB_APP_URL_HERE") || API_URL === "") {
                showToast("🛠️ โหมดจำลองในตัว", "กำลังแสดงข้อมูลจำลองเพื่อความคล่องตัวของการพรีวิวงานออกแบบ", "info");
                setupMockDatabase();
                return;
            }

            indicator.className = "w-2.5 h-2.5 rounded-full shimmer-loading";
            text.innerText = "กำลังเชื่อมสัญญาณแบบเข้ารหัสกับฐานข้อมูล Google Sheets...";

            try {
                // ดึงรายชื่อนักเรียนทั้งหมด
                const resStudents = await fetch(`${API_URL}?action=getStudents`);
                studentsDataset = await resStudents.json();

                // ดึงสถิติสาย
                const resLogs = await fetch(`${API_URL}?action=getLogs`);
                logsDataset = await resLogs.json();

                // ตกแต่ง UI สถานะเชื่อมต่อ
                indicator.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 active-glow";
                text.innerHTML = `<span class="text-emerald-500 font-bold">เชื่อมสัญญาณคลาวด์สดสำเร็จ (Real-time Cloud Connected)</span>`;
                
                updateTodayLatenessCount();
            } catch (err) {
                console.error(err);
                indicator.className = "w-2.5 h-2.5 rounded-full bg-rose-500";
                text.innerHTML = `<span class="text-rose-500 font-bold">เกิดข้อผิดพลาดด้านเครือข่าย หรือ URL สคริปต์ไม่ถูกต้อง</span>`;
                showToast("📡 สัญญาณขัดข้อง", "ไม่สามารถอ่านจากกูเกิลสเปรดชีตได้เนื่องจากปัญหาสิทธิ์การเข้าถึง", "error");
            }
        }

        // อัปเดตสถิติจำนวนคนมาสายวันนี้ (แก้ไขการคิดสถิติเรียบร้อย)
        function updateTodayLatenessCount() {
            const selectedDate = normalizeDate(document.getElementById('record-date-picker').value);
            // เปรียบเทียบวันที่หลังจากทำการ normalize ป้องกันรูปแบบเพี้ยน
            const todayLogs = logsDataset.filter(log => normalizeDate(log.timestamp) === selectedDate);
            
            const element = document.getElementById('lbl-today-count');
            element.innerText = todayLogs.length;
            
            // เอฟเฟกต์ตัวเลขสั่นสะเทือนนุ่มๆ เมื่อตัวเลขมีการอัปเดต
            element.classList.remove('scale-110');
            void element.offsetWidth; // Trigger reflow
            element.classList.add('scale-110', 'transition-transform', 'duration-300');
        }

        // ==========================================
        // 🔍 SECTION: FUZZY SEARCH LOGIC
        // ==========================================
        function executeFuzzySearch(val) {
            const query = val.trim().toLowerCase();
            const dropdown = document.getElementById('search-results-dropdown');
            dropdown.innerHTML = "";

            if (!query) { dropdown.classList.add('hidden'); return; }

            const filtered = studentsDataset.filter(st => 
                st.id.toLowerCase().includes(query) || st.name.toLowerCase().includes(query)
            ).slice(0, 5); // จำกัด 5 รายการที่ตรงสุดเพื่อความเรียบหรูของหน้าเว็บ

            if (filtered.length === 0) {
                dropdown.innerHTML = `<div class="p-4 text-xs text-slate-400 text-center font-semibold">ไม่พบรายชื่อในระบบโรงเรียนเลยครับ 🔍</div>`;
            } else {
                filtered.forEach(st => {
                    const div = document.createElement('div');
                    div.className = "p-3.5 text-xs border-b border-slate-50 hover:bg-emerald-50/50 cursor-pointer flex justify-between items-center transition-all duration-200 hover:pl-5";
                    div.innerHTML = `
                        <div>
                            <span class="font-bold text-slate-800 text-sm">${st.name}</span>
                            <p class="text-[10px] text-slate-400 mt-0.5">ห้องเรียน ม.${st.room} | เลขที่ ${st.seatNo}</p>
                        </div>
                        <span class="font-mono bg-slate-100 px-2.5 py-1 rounded-lg font-bold text-slate-500 border border-slate-200/50 text-[10px]">${st.id}</span>
                    `;
                    div.onclick = () => selectStudentProfile(st);
                    dropdown.appendChild(div);
                });
            }
            dropdown.classList.remove('hidden');
        }

        function selectStudentProfile(st) {
            selectedStudent = st;
            document.getElementById('search-results-dropdown').classList.add('hidden');
            document.getElementById('record-student-search').value = "";
            
            const container = document.getElementById('locked-student-container');
            document.getElementById('locked-name').innerText = st.name;
            document.getElementById('locked-id').innerText = st.id;
            document.getElementById('locked-room').innerText = st.room;
            document.getElementById('locked-seat').innerText = st.seatNo;
            
            container.classList.remove('hidden');
            container.classList.add('animate-premium-entry'); // สไลด์ขึ้นสวยงาม
        }

        function resetSelectedStudent() {
            selectedStudent = null;
            document.getElementById('locked-student-container').classList.add('hidden');
        }

        // ==========================================
        // 💾 SECTION: SAVE RECORD EXECUTION (POST API)
        // ==========================================
        async function executeLatenessSave() {
            if (!selectedStudent) {
                showToast("⚠️ ไม่พบบันทึกข้อมูล", "โปรดเลือกตัวตนนักเรียนให้เสร็จสิ้นก่อนส่งผลสถิติครับ", "error");
                return;
            }

            const rawSelectedDate = document.getElementById('record-date-picker').value;
            const normalizedDateStr = normalizeDate(rawSelectedDate);
            const reason = document.getElementById('record-reason-select').value;
            const notes = document.getElementById('record-notes-input').value.trim() || "-";
            const logId = "L-" + Date.now() + "-" + Math.floor(1000 + Math.random() * 9000);

            const payload = {
                logId: logId,
                timestamp: normalizedDateStr,
                id: selectedStudent.id,
                name: selectedStudent.name,
                room: selectedStudent.room,
                seatNo: selectedStudent.seatNo,
                reason: reason,
                notes: notes
            };

            const saveBtn = document.getElementById('btn-save-log');
            saveBtn.disabled = true;
            saveBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-2"></i> <span>กำลังเข้ารหัสความปลอดภัยและเซฟประวัติ...</span>`;

            try {
                if (API_URL.includes("YOUR_WEB_APP_URL_HERE") || API_URL === "") {
                    // โหมดจำลองบันทึกทันที
                    logsDataset.push(payload);
                    localStorage.setItem('mock_logs', JSON.stringify(logsDataset));
                    simulateSuccessSave();
                } else {
                    // ป้องกัน CORS และอัปโหลดข้อมูลสดเข้า Google Sheet
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    // เนื่องจากเป็น no-cors เบราว์เซอร์จะไม่แสดงคำตอบให้ JS อ่าน แต่อัปโหลดเข้าชีตได้ทันที ถือเป็นความสำเร็จ
                    logsDataset.push(payload);
                    simulateSuccessSave();
                }
            } catch (err) {
                showToast("❌ การบันทึกล้มเหลว", "ไม่สามารถส่งต่อสัญญาณคลาวด์ได้ในขณะนี้", "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2"></i> <span>บันทึกข้อมูลแบบออโตเซฟ</span>`;
            }
        }

        function simulateSuccessSave() {
            showToast("✅ สำเร็จอย่างงดงาม", `บันทึกพฤติกรรมการมาสายของ ${selectedStudent.name} แล้ว`, "success");
            document.getElementById('record-notes-input').value = "";
            resetSelectedStudent();
            updateTodayLatenessCount();
        }

        // ==========================================
        // 📊 SECTION: ANALYTICS & DASHBOARD GENERATION
        // ==========================================
        function loadDashboardCoreData() {
            const startWeekStr = document.getElementById('dash-date-week-picker').value;
            if (!startWeekStr) return;

            const startWeekDate = new Date(startWeekStr);
            const endWeekDate = new Date(startWeekDate);
            endWeekDate.setDate(endWeekDate.getDate() + 6); // ล็อกรอบวันถึงวันอาทิตย์สุดสัปดาห์

            // กรอง Logs ภายในกรอบสัปดาห์ปัจจุบันแบบเปรียบเทียบมาตรฐาน ISO
            const weekLogs = logsDataset.filter(log => {
                const logDate = new Date(log.timestamp);
                return logDate >= startWeekDate && logDate <= endWeekDate;
            });

            // KPI 1: แสดงจำนวนคนสายสัปดาห์นี้
            document.getElementById('kpi-total-weeks').innerText = weekLogs.length;

            // คัดแยกวิเคราะห์กลุ่มเสียงโดยดึงข้อมูลรายบุคคล
            const studentFrequencyMap = {};
            weekLogs.forEach(log => {
                if (!studentFrequencyMap[log.id]) {
                    studentFrequencyMap[log.id] = { details: log, count: 0 };
                }
                studentFrequencyMap[log.id].count++;
            });

            let highRiskCount = 0;
            let midRiskCount = 0;
            const leaderboardData = [];

            Object.keys(studentFrequencyMap).forEach(id => {
                const item = studentFrequencyMap[id];
                if (item.count >= 3) {
                    highRiskCount++; // มาสายเกิน 3 วันเป็นต้นไปจัดเป็นกลุ่ม "เสี่ยงระดับสูงมาก"
                } else if (item.count === 2) {
                    midRiskCount++; // มาสาย 2 วันเป็นกลุ่ม "เฝ้าระวังกลาง"
                }

                leaderboardData.push({
                    id: id,
                    name: item.details.name,
                    roomInfo: `ชั้น ม.${item.details.room} / เลขที่ ${item.details.seatNo}`,
                    count: item.count
                });
            });

            // อัปเดตตัวเลขแบบสั้นกระชับสอดคล้องกับชีตจริง
            document.getElementById('kpi-high-risk').innerText = highRiskCount;
            document.getElementById('kpi-mid-risk').innerText = midRiskCount;

            // เรียงลำดับนักเรียนที่มาสายบ่อยที่สุดเพื่อส่งตรวจฝ่ายปกครอง
            leaderboardData.sort((a, b) => b.count - a.count);
            renderLeaderboardTable(leaderboardData);

            // ขับเคลื่อนแอนิเมชันกราฟิกสถิติ
            generateDashboardCharts(weekLogs);
        }

        function renderLeaderboardTable(data) {
            const tbody = document.getElementById('tbl-leaderboard-body');
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-12 text-center text-slate-400 font-semibold animate-premium-entry">🍃 ไม่มีรายงานนักเรียนสายสะสมในสัปดาห์ที่คัดกรอง</td></tr>`;
                return;
            }

            data.forEach((st, idx) => {
                let badge = `<span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-bold text-[10px] border border-slate-200">เฝ้าระวังปกติ</span>`;
                if (st.count >= 3) {
                    badge = `<span class="bg-rose-50 text-rose-600 border border-rose-100 px-3 py-1 rounded-full font-bold text-[10px] shadow-sm animate-pulse">🚨 เสี่ยงสูง (เชิญผู้ปกครอง)</span>`;
                } else if (st.count === 2) {
                    badge = `<span class="bg-amber-50 text-amber-600 border border-amber-100 px-3 py-1 rounded-full font-bold text-[10px] shadow-sm">⚠️ เสี่ยงกลาง (ว่ากล่าวตักเตือน)</span>`;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/70 transition-all duration-200 border-b border-slate-100 animate-premium-entry";
                tr.style.animationDelay = `${idx * 50}ms`; // เอฟเฟกต์ดีเลย์การปรากฏของข้อมูลทีละแถวระดับพรีเมียม
                tr.innerHTML = `
                    <td class="px-5 py-3.5 text-center font-bold text-slate-400 text-sm">${idx + 1}</td>
                    <td class="px-5 py-3.5 font-mono font-bold text-emerald-600">${st.id}</td>
                    <td class="px-5 py-3.5 font-bold text-slate-900">${st.name}</td>
                    <td class="px-5 py-3.5 font-semibold text-slate-500">${st.roomInfo}</td>
                    <td class="px-5 py-3.5 text-center font-extrabold text-slate-900 text-sm">${st.count} ครั้ง</td>
                    <td class="px-5 py-3.5">${badge}</td>
                    <td class="px-5 py-3.5 text-center">
                        <button onclick="openLogsManagerModal('${st.id}')" class="premium-btn bg-slate-100 hover:bg-slate-900 hover:text-white text-slate-700 font-bold px-3 py-1.5 rounded-xl text-xs transition-all duration-300 shadow-sm border border-slate-200/40">
                            <i class="fa-solid fa-folder-open mr-1"></i> ตรวจรายงาน
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function generateDashboardCharts(weekLogs) {
            const daysCount = { 'Mon': 0, 'Tue': 0, 'Wed': 0, 'Thu': 0, 'Fri': 0 };
            const reasonsCount = {};

            weekLogs.forEach(log => {
                const d = new Date(log.timestamp);
                const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                if (daysCount[dayName] !== undefined) daysCount[dayName]++;

                reasonsCount[log.reason] = (reasonsCount[log.reason] || 0) + 1;
            });

            // วาดกราฟแท่งความถี่ด้วย Smooth Scaling Bar
            const barHolder = document.getElementById('chart-bar-holder');
            barHolder.innerHTML = "";
            
            const maxVal = Math.max(...Object.values(daysCount), 1);
            const dayThLabels = { 'Mon': 'จันทร์', 'Tue': 'อังคาร', 'Wed': 'พุธ', 'Thu': 'พฤหัสฯ', 'Fri': 'ศุกร์' };

            Object.keys(daysCount).forEach((day, index) => {
                const count = daysCount[day];
                const pct = (count / maxVal) * 80 + 10; 
                const bar = document.createElement('div');
                bar.className = "flex flex-col items-center flex-grow group space-y-2.5 animate-premium-entry";
                bar.style.animationDelay = `${index * 80}ms`;
                bar.innerHTML = `
                    <div class="w-8 bg-slate-100 group-hover:bg-emerald-500 group-hover:active-glow rounded-t-xl transition-all duration-500 relative flex items-end justify-center" style="height: ${pct}%">
                        <span class="absolute -top-7 text-[10px] font-extrabold text-white opacity-0 group-hover:opacity-100 transition-opacity bg-slate-900 border border-slate-800 shadow-lg px-2 py-0.5 rounded-lg z-10">${count} ราย</span>
                    </div>
                    <span class="text-[11px] font-bold text-slate-400 group-hover:text-slate-800 transition-colors">${dayThLabels[day]}</span>
                `;
                barHolder.appendChild(bar);
            });

            // ประมวลเหตุผลประกอบคำชี้แจง
            const legendList = document.getElementById('reasons-legend-list');
            legendList.innerHTML = "";
            const total = weekLogs.length || 1;

            const colors = ['bg-emerald-500', 'bg-amber-500', 'bg-rose-500', 'bg-sky-500', 'bg-purple-500'];
            let colorIdx = 0;

            Object.keys(reasonsCount).forEach(reason => {
                const count = reasonsCount[reason];
                const pct = ((count / total) * 100).toFixed(0);
                const li = document.createElement('li');
                li.className = "flex items-center justify-between gap-4 py-2 border-b border-slate-50 animate-premium-entry";
                li.innerHTML = `
                    <div class="flex items-center gap-2.5">
                        <span class="w-3 h-3 rounded-full ${colors[colorIdx % colors.length]} active-glow"></span>
                        <span class="font-bold text-slate-700 text-xs">${reason}</span>
                    </div>
                    <strong class="font-mono text-slate-900">${pct}% (${count})</strong>
                `;
                legendList.appendChild(li);
                colorIdx++;
            });
        }

        // ==========================================
        // 🗂️ SECTION: DETAIL LOGS MANAGEMENT & DELETE
        // ==========================================
        function openLogsManagerModal(studentId) {
            currentEditingStudentId = studentId;
            const studentLogs = logsDataset.filter(log => log.id === studentId);
            if (studentLogs.length === 0) return;

            document.getElementById('mgr-modal-student-name').innerText = studentLogs[0].name;
            document.getElementById('mgr-modal-student-desc').innerText = `รหัสประจำตัว: ${studentLogs[0].id} | ชั้น ม.${studentLogs[0].room} / เลขที่ ${studentLogs[0].seatNo}`;

            const tbody = document.getElementById('tbl-mgr-logs-body');
            tbody.innerHTML = "";

            studentLogs.forEach((log, idx) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors animate-premium-entry";
                tr.style.animationDelay = `${idx * 40}ms`;
                tr.innerHTML = `
                    <td class="px-4 py-3 text-slate-800 font-mono font-semibold">${log.timestamp}</td>
                    <td class="px-4 py-3 font-semibold text-slate-800">${log.reason}</td>
                    <td class="px-4 py-3 text-slate-400 font-medium">${log.notes}</td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="triggerDeleteConfirmation('${log.logId}')" class="text-rose-500 hover:text-rose-700 p-1 font-bold text-xs transition-colors duration-200">
                            <i class="fa-regular fa-trash-can mr-1"></i> ลบประวัติแถวนี้
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const modal = document.getElementById('logs-manager-modal');
            modal.classList.remove('hidden');
            modal.firstElementChild.classList.add('animate-premium-entry'); // เอฟเฟกต์บานหน้าต่างค่อยๆ เปิดขยาย
        }

        function closeLogsManagerModal() {
            document.getElementById('logs-manager-modal').classList.add('hidden');
        }

        function triggerDeleteConfirmation(logId) {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-modal-text').innerText = `คุณแน่ใจหรือไม่ว่าต้องการถอดถอนประวัติมาสายหมายเลข "${logId}"? รายการนี้จะสูญหายอย่างถาวร`;
            modal.classList.remove('hidden');

            document.getElementById('confirm-submit-btn').onclick = async function() {
                modal.classList.add('hidden');
                await executeDeleteLogFromCloud(logId);
            };
            document.getElementById('confirm-cancel-btn').onclick = function() {
                modal.classList.add('hidden');
            };
        }

        async function executeDeleteLogFromCloud(logId) {
            showToast("⏳ กำลังเตรียมการลบ", "ส่งรหัสคำสั่งไปยังกูเกิลคลาวด์เพื่อถอดถอนรายการแล้ว...", "info");
            
            try {
                if (API_URL.includes("YOUR_WEB_APP_URL_HERE") || API_URL === "") {
                    logsDataset = logsDataset.filter(l => l.logId !== logId);
                    localStorage.setItem('mock_logs', JSON.stringify(logsDataset));
                    handleDeleteSuccess();
                } else {
                    const res = await fetch(`${API_URL}?action=deleteLog&logId=${logId}`);
                    const result = await res.json();
                    if (result.status === "success") {
                        logsDataset = logsDataset.filter(l => l.logId !== logId);
                        handleDeleteSuccess();
                    } else {
                        showToast("❌ การลบล้มเหลว", "เซิร์ฟเวอร์คลาวด์ปฏิเสธการถอนข้อมูล", "error");
                    }
                }
            } catch (err) {
                showToast("📡 สัญญาณไม่ดี", "ไม่สามารถส่งสัญญาณขอลบข้อมูลถึงปลายทางสเปรดชีตได้", "error");
            }
        }

        function handleDeleteSuccess() {
            showToast("🗑️ ลบประวัติเรียบร้อย", "ทำการจัดสัดส่วนระเบียบประวัติใหม่ในระบบฐานข้อมูลแล้ว", "success");
            const checkStillHasLogs = logsDataset.filter(log => log.id === currentEditingStudentId);
            if (checkStillHasLogs.length > 0) {
                openLogsManagerModal(currentEditingStudentId);
            } else {
                closeLogsManagerModal();
            }
            loadDashboardCoreData(); 
        }

        // ==========================================
        // 🖨️ SECTION: REPORT GENERATION & PRINT
        // ==========================================
        function handlePrintExport() {
            const currentWeek = document.getElementById('dash-date-week-picker').value;
            document.getElementById('print-date-subtitle').innerText = `รายงานผลการตรวจสอบพฤติกรรมสาย ประจำสัปดาห์: เริ่มวันที่ ${currentWeek} (บันทึกพิมพ์วันที่: ${new Date().toLocaleString('th-TH')})`;
            window.print();
        }

        // ==========================================
        // 💡 SECTION: TOAST NOTIFICATIONS HANDLER
        // ==========================================
        function showToast(title, message, type = "success") {
            const toast = document.getElementById('toast-notification');
            const iconBg = document.getElementById('toast-icon-bg');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-message').innerText = message;

            if (type === 'success') {
                iconBg.className = "p-2 rounded-xl text-white bg-emerald-500 active-glow shadow-lg shadow-emerald-500/30";
                icon.className = "fa-solid fa-circle-check";
            } else if (type === 'error') {
                iconBg.className = "p-2 rounded-xl text-white bg-rose-500 shadow-lg shadow-rose-500/30";
                icon.className = "fa-solid fa-circle-xmark";
            } else {
                iconBg.className = "p-2 rounded-xl text-white bg-sky-500 shadow-lg shadow-sky-500/30";
                icon.className = "fa-solid fa-circle-info";
            }

            toast.className = "fixed top-5 right-5 z-[9999] transform translate-y-0 opacity-100 transition-all duration-500 cubic-bezier(0.16, 1, 0.3, 1) max-w-sm w-full bg-white/95 backdrop-blur shadow-2xl rounded-2xl border border-slate-100 p-4 flex items-start space-x-3";
            
            setTimeout(() => {
                toast.className = "fixed top-5 right-5 z-[9999] transform translate-y-[-150%] opacity-0 transition-all duration-500 max-w-sm w-full bg-white shadow-xl rounded-2xl border border-slate-100 p-4 flex items-start space-x-3 pointer-events-none";
            }, 3500);
        }

                { id: "10003", name: "นายธนพล ขยันมาสาย", room: "6/2", seatNo: "15" },
                { id: "10004", name: "นางสาวกนกกร พรประเสริฐ", room: "5/3", seatNo: "24" },
                { id: "10005", name: "นายปกรณ์ เกียรติเจริญ", room: "4/2", seatNo: "8" }
            ];
            
            const savedMockLogs = localStorage.getItem('mock_logs');

                ];
            }
            updateTodayLatenessCount();
        }
    </script>
